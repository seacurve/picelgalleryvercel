  <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=jMDCC53eeCoHEGbBnT_DKzYB5FXrN6kxt8eXma9h48JYsD9J1fR-A5ROs7MsBVFtu2lxaVjlWvGmJ2mB6SjcieujsLxNex6-M-qo-gfZMpaag9tgL1fO4J6gl3FaP4ZuMbHjxu8xxy3VMLWmfG44kCD27k7yxdge2Aghlqqg-_RQF6jntV9KU-HCgX-eW_ObmcWQptOLSIlJJaDdOxKAUE3adODGEM7W2JwlCmundEK2nIsRk1QH4PYchxXZy_5XH7_rOmHD_iUMFV74FrO-lrHQ5DlnCSjMpX2NvYemG6CRvR51k9hUXq8ZkpTBZ2DIbunX-A1AekikOEFu6T5Ye66z4VYdNfczl8UYA7U8cFsA0-a79H_q9QwAR1Ujq0dSGH67mZxqdiElL2bcokiREJgHJpQEeJ272QrLZl1lnxFiL3P52_UPZw5XcyhtOqFEDa3UGhm2qF1lG5KpU-fkIK_73OKZQoL6lUVQaHonYnWQ9mHW8pLqk7xWeVmz7dPrxYJIq6A2Jt2_HGEnpsPBDX6XKxK9xDkp7NcER8RBJ2zx3hc3W_K--cSFXQmEWhzc4R-Hhp57czo4ahUKuKcLasiEtlbHUJTgigNjIXHbVqU9nSsY0vJABqA9ltr1frg7ZuLn07BOCg8mHvQ6fw8P0g" charset="UTF-8"></script><link rel="stylesheet" crossorigin="anonymous" href="https://gc.kis.v2.scr.kaspersky-labs.com/E3E8934C-235A-4B0E-825A-35A08381A191/abn/main.css?attr=aHR0cHM6Ly9wcm9kLWNoYXQta2ltaS50b3MtY24tYmVpamluZy52b2xjZXMuY29tL2tpbWktZnMvb2tjL3pqbzZvbXM2cG50a28vb3V0cHV0L2luZGV4Lmh0bWw_WC1Ub3MtQWxnb3JpdGhtPVRPUzQtSE1BQy1TSEEyNTYmWC1Ub3MtQ3JlZGVudGlhbD1BS0xUWVRKbE5qZ3dNalkyWkRCa05ERmlZbUk1WVdOaVpEQmxabUZtWWpJelpUQSUyZjIwMjYwNjIzJTJmY24tYmVpamluZyUyZnRvcyUyZnJlcXVlc3QmWC1Ub3MtRGF0ZT0yMDI2MDYyM1QxNTAyMjJaJlgtVG9zLUV4cGlyZXM9NTE4NDAwJlgtVG9zLVNpZ25hdHVyZT0wMWMxZGI4ZDg3NTVhYzc2MDJlZjMwNjcxYmJiM2RhYjUyNDU2M2MzYzhhN2JjMTRkMDE3NmQ4OWM1ZTJjNWVjJlgtVG9zLVNpZ25lZEhlYWRlcnM9aG9zdCZyZXNwb25zZS1jb250ZW50LWRpc3Bvc2l0aW9uPWF0dGFjaG1lbnQlM2IlMjBmaWxlbmFtZSUyYSUzZFVURi04JTI3JTI3aW5kZXguaHRtbA"/><script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1a1a1a;
      --accent: #e8c4a0;
      --accent2: #c9956b;
      --text: #f5f0eb;
      --muted: rgba(245,240,235,0.45);
      --vip: #d4af7a;
      --lock-bg: rgba(10,10,10,0.82);
      --radius: 16px;
      --font-display: 'Georgia', serif;
      --font-body: system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100dvh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      overscroll-behavior: none;
    }

    /* ── App Container ── */
    #app {
      height: 100dvh;
      min-height: 100dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-top: 100px;
      padding-bottom: 24px;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 12px 16px 8px;
      background: linear-gradient(to bottom, rgba(10,10,10,0.98) 60%, transparent);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #header .brand {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    #header .brand span {
      color: var(--muted);
      font-size: 13px;
      font-family: var(--font-body);
      font-style: italic;
      margin-left: 6px;
    }

    /* ── Filter tabs ── */
    #filters {
      position: fixed;
      top: 52px; left: 0; right: 0;
      z-index: 99;
      display: flex;
      gap: 8px;
      padding: 0 16px 10px;
      overflow-x: auto;
      scrollbar-width: none;
      background: linear-gradient(to bottom, rgba(10,10,10,0.95) 70%, transparent);
    }
    #filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid rgba(232,196,160,0.25);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #0a0a0a;
      font-weight: 600;
    }

    /* ── Gallery Grid ── */
    #gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 0 12px;
    }

    /* ── Card ── */
    .card {
      position: relative;
      aspect-ratio: 3/4;
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface2);
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .card:active {
      transform: scale(0.97);
    }

    .card-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }

    .card-thumb-placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a1f1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-thumb-placeholder svg {
      opacity: 0.2;
    }

    /* gradient overlay */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(10,10,10,0.5) 70%,
        rgba(10,10,10,0.9) 100%
      );
      pointer-events: none;
    }

    /* ── VIP lock overlay ── */
    .lock-overlay {
      position: absolute;
      inset: 0;
      background: var(--lock-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 10;
      padding: 12px;
      text-align: center;
    }

    .lock-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(212,175,122,0.15);
      border: 1px solid rgba(212,175,122,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lock-title {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--vip);
    }

    .lock-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    .lock-btn {
      margin-top: 2px;
      padding: 8px 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent2), var(--vip));
      color: #0a0a0a;
      font-weight: 700;
      font-size: 12px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    /* ── Card info ── */
    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 5;
      padding: 10px 10px 12px;
    }

    .card-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .card-tag.free { background: rgba(255,255,255,0.12); color: var(--muted); }
    .card-tag.vip  { background: rgba(212,175,122,0.2); color: var(--vip); border: 1px solid rgba(212,175,122,0.3); }

    .card-title {
      font-family: var(--font-display);
      font-size: 13px;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    .card-meta {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-meta .views {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* ── Play button ── */
    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 6;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(232,196,160,0.2);
      border: 1.5px solid rgba(232,196,160,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    /* ── Empty state ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      padding: 60px 20px;
      display: none;
    }

    /* ── Loading ── */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(232,196,160,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── NEW badge ── */
    .new-badge {
      display: inline-block;
      background: #e05c5c;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 6px;
      letter-spacing: 0.05em;
      vertical-align: middle;
      margin-left: 4px;
    }

    /* ── Error display ── */
    #error-display {
      display: none;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }
    #error-display.active {
      display: block;
    }
  </style>
</head>
<body>

<div id="header">
  <div class="brand">Picel <span>by picelmareen</span></div>
</div>

<div id="filters">
  <button class="filter-btn active" data-filter="all">Semua</button>
  <button class="filter-btn" data-filter="free">Free</button>
  <button class="filter-btn" data-filter="vip">⭐ VIP</button>
</div>

<div id="app">
  <div id="loading"><div class="spinner"></div></div>
  <div id="error-display"></div>
  <div id="gallery"></div>
  <div id="empty">
    <svg width="48" height="48" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="1.5" d="M15 10l4.553-2.277A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
    <p>Belum ada video di sini</p>
  </div>
</div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────────────
  const SUPABASE_URL = 'https://irxgakgqekaeyiseorya.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeGdha2dxZWthZXlpc2VvcnlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTk4OTAsImV4cCI6MjA5Nzc3NTg5MH0.6Wk7JX_u5frC9PxOUcuQhh8FGocno19tQPxd6aJzDPE';
  const VIP_CHANNEL_URL = 'https://t.me/+kzzqCLI6jIw3MWI1';
  // ─────────────────────────────────────────────────────────────────────────

  // ── Safe Telegram API Access (Fix Android race condition) ────────────────
  let tg = null;
  try {
    tg = window.Telegram?.WebApp || null;
  } catch (e) {
    console.warn('Telegram WebApp not available:', e);
  }

  // ── Init Telegram dengan delay buat Android ────────────────────────────
  function initTelegram() {
    if (!tg) return;

    try {
      if (typeof tg.ready === 'function') tg.ready();

      // Delay expand & config buat Android WebView
      setTimeout(() => {
        try {
          if (typeof tg.expand === 'function') tg.expand();
          if (typeof tg.setHeaderColor === 'function') tg.setHeaderColor('#0a0a0a');
          if (typeof tg.setBackgroundColor === 'function') tg.setBackgroundColor('#0a0a0a');
          if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();
        } catch (err) {
          console.warn('Telegram expand error:', err);
        }
      }, 150);
    } catch (err) {
      console.warn('Telegram init error:', err);
    }
  }

  // Panggil init
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initTelegram);
  } else {
    initTelegram();
  }

  let allVideos = [];
  let activeFilter = 'all';
  const ONE_WEEK_MS = 7 * 24 * 60 * 60 * 1000;

  function isNew(postedAt) {
    if (!postedAt) return false;
    return Date.now() - new Date(postedAt).getTime() < ONE_WEEK_MS;
  }

  function formatDuration(sec) {
    if (!sec) return '';
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  // ── Fetch dengan error handling lengkap ─────────────────────────────────
  async function fetchVideos() {
    const url = `${SUPABASE_URL}/rest/v1/videos?select=*&order=posted_at.desc&limit=200`;

    try {
      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        mode: 'cors',
        cache: 'no-cache'
      });

      if (!res.ok) {
        const errText = await res.text().catch(() => 'Unknown error');
        throw new Error(`HTTP ${res.status}: ${errText}`);
      }

      return await res.json();
    } catch (err) {
      console.error('Fetch error:', err);
      throw err;
    }
  }

  async function incrementView(id) {
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_view`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ video_id: id }),
      });
    } catch (err) {
      console.warn('Increment view failed:', err);
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-display');
    el.textContent = msg;
    el.classList.add('active');
    document.getElementById('loading').style.display = 'none';
  }

  function buildCard(video) {
    const isVip = video.tier === 'vip';
    const fresh = isNew(video.posted_at);

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = video.id;
    card.dataset.url = video.telegram_url;
    card.dataset.tier = video.tier;

    // Thumbnail
    if (video.thumbnail_url) {
      const img = document.createElement('img');
      img.className = 'card-thumb';
      img.src = video.thumbnail_url;
      img.alt = video.title || 'Video';
      img.loading = 'lazy';
      img.onerror = function() {
        // Fallback kalo thumbnail gagal load
        this.style.display = 'none';
        const ph = document.createElement('div');
        ph.className = 'card-thumb-placeholder';
        ph.innerHTML = `<svg width="40" height="40" fill="none" viewBox="0 0 24 24"><path stroke="#fff" stroke-width="1.2" d="M15 10l4.553-2.277A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>`;
        card.insertBefore(ph, card.firstChild);
      };
      card.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'card-thumb-placeholder';
      ph.innerHTML = `<svg width="40" height="40" fill="none" viewBox="0 0 24 24"><path stroke="#fff" stroke-width="1.2" d="M15 10l4.553-2.277A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>`;
      card.appendChild(ph);
    }

    // VIP lock
    if (isVip) {
      const lock = document.createElement('div');
      lock.className = 'lock-overlay';
      lock.innerHTML = `
        <div class="lock-icon">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path stroke="#d4af7a" stroke-width="1.8" stroke-linecap="round" d="M7 11V7a5 5 0 0110 0v4M5 11h14a1 1 0 011 1v8a1 1 0 01-1 1H5a1 1 0 01-1-1v-8a1 1 0 011-1z"/></svg>
        </div>
        <div class="lock-title">VIP</div>
        <div class="lock-sub">Gabung Jolie Privée</div>
        <button class="lock-btn" onclick="openVip(event)">⭐ Gabung</button>
      `;
      card.appendChild(lock);
    } else {
      const playBtn = document.createElement('div');
      playBtn.className = 'play-btn';
      playBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 4l14 8-14 8V4z" fill="#e8c4a0"/></svg>`;
      card.appendChild(playBtn);
    }

    // Info
    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `
      <span class="card-tag ${video.tier}">${isVip ? '⭐ VIP' : 'Free'}</span>
      <div class="card-title">
        ${(video.title || 'Picel').replace(/</g, '&lt;')}
        ${fresh ? '<span class="new-badge">NEW</span>' : ''}
      </div>
      <div class="card-meta">
        ${video.duration ? `<span>${formatDuration(video.duration)}</span>` : ''}
        <span class="views">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="1.8" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
          ${video.view_count ?? 0}
        </span>
      </div>
    `;
    card.appendChild(info);

    if (!isVip) {
      card.addEventListener('click', () => openVideo(video));
    }

    return card;
  }

  function openVideo(video) {
    incrementView(video.id);
    const url = video.telegram_url;
    if (!url) return;

    if (tg && typeof tg.openLink === 'function') {
      tg.openLink(url);
    } else {
      window.open(url, '_blank');
    }
  }

  function openVip(e) {
    if (e) e.stopPropagation();
    if (tg && typeof tg.openLink === 'function') {
      tg.openLink(VIP_CHANNEL_URL);
    } else {
      window.open(VIP_CHANNEL_URL, '_blank');
    }
  }

  function renderGallery(videos) {
    const gallery = document.getElementById('gallery');
    const empty = document.getElementById('empty');
    gallery.innerHTML = '';

    const filtered = activeFilter === 'all'
      ? videos
      : videos.filter(v => v.tier === activeFilter);

    if (filtered.length === 0) {
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    filtered.forEach(v => gallery.appendChild(buildCard(v)));
    buildTagFilters(videos);
  }

  function buildTagFilters(videos) {
    const allTags = new Set();
    videos.forEach(v => {
      if (Array.isArray(v.tags)) {
        v.tags.forEach(t => { if (t) allTags.add(t); });
      }
    });

    const filters = document.getElementById('filters');
    filters.querySelectorAll('.filter-btn[data-tag]').forEach(b => b.remove());

    allTags.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = tag;
      btn.dataset.tag = tag;
      btn.textContent = `#${tag}`;
      btn.addEventListener('click', () => setFilter(tag, btn));
      filters.appendChild(btn);
    });
  }

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(allVideos);
  }

  document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => setFilter(btn.dataset.filter, btn));
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  (async () => {
    try {
      allVideos = await fetchVideos();
      document.getElementById('loading').style.display = 'none';

      if (!Array.isArray(allVideos)) {
        throw new Error('Invalid response format');
      }

      renderGallery(allVideos);
    } catch (err) {
      console.error('Init error:', err);
      showError('Gagal memuat data. Coba lagi nanti.\n' + err.message);
    }
  })();
</script>
</body>
</html>
